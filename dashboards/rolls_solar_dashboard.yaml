  #           name: Stare automatizare
  #           icon: mdi:state-machine

  # ════════════════════════════════════════════════════════════════════════════

  # ── Activitate recentă ───────────────────────────────────────────────────────
  - type: markdown
    title: Activitate recentă
    content: >-
      {% set log = state_attr(
        'sensor.rolls_solar_controller_surplus_solar', 'action_log'
      ) | default([]) %}
      {% if log %}
      {% for line in log %}
      `{{ line }}`

      {% endfor %}
      {% else %}
      _Nicio activitate înregistrată_
      {% endif %}

  # ── Grafic surplus (2h) — fără refresh_interval pentru performanță ───────────
  - type: history-graph
    title: Surplus solar (2h)
    hours_to_show: 2
    entities:
      - entity: sensor.rolls_solar_controller_surplus_solar
        name: Surplus (W)
      - entity: sensor.shelly_em_channel_1_power # ← producție
        name: Producție (W)
