  #           name: Jaluzea
  #           icon: mdi:window-shutter
  #         - type: tile
  #           entity: sensor.rolls_solar_controller_status_dormitor_sud
  #           name: Status
  #           icon: mdi:robot-outline
  #         - type: gauge
  #           entity: cover.dormitor_sud
  #           name: Poziție
  #           attribute: current_position
  #           min: 0
  #           max: 100
  #           needle: false
  #           severity:
  #             green: 60
  #             yellow: 20
  #             red: 0
  #     - type: entities
  #       show_header_toggle: false
  #       state_color: true
  #       entities:
  #         - entity: switch.rolls_solar_controller_activ_dormitor_sud
  #           name: Include în automatizare
  #         - entity: number.rolls_solar_controller_pozitie_deschidere_dormitor_sud
  #           name: Deschidere țintă (%)
  #         - type: attribute
  #           entity: sensor.rolls_solar_controller_status_dormitor_sud
  #           attribute: pozitie
  #           name: Poziție curentă (%)
  #           icon: mdi:percent
  #         - type: attribute
  #           entity: sensor.rolls_solar_controller_status_dormitor_sud
  #           attribute: stare_cover
  #           name: Stare cover
  #           icon: mdi:window-shutter
  #         - type: attribute
  #           entity: sensor.rolls_solar_controller_status_dormitor_sud
  #           attribute: este_deschisa
  #           name: Este deschisă
  #           icon: mdi:check-circle
  #         - type: attribute
